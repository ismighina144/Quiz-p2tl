<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis P2TL</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(180deg, #0b2a4a, #1a5276, #2e86c1, #85c1e9);
        }
        .container {
            max-width: 850px;
            width: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            max-height: 98vh;
            overflow-y: auto;
        }
        h1 {
            text-align: center;
            color: #0b2a4a;
            border-bottom: 3px solid #1a5276;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        h1 span { color: #c0392b; }
        .sub {
            text-align: center;
            font-size: 14px;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #eaf2f8;
            padding: 10px 18px;
            border-radius: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .progress .info { font-weight: 600; color: #1a3a5a; }
        .bar {
            flex: 1;
            height: 8px;
            background: #d5dbdb;
            border-radius: 10px;
            min-width: 80px;
        }
        .bar-fill {
            height: 100%;
            width: 0%;
            background: #1a5276;
            border-radius: 10px;
            transition: 0.3s;
        }
        .btn-reset {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-reset:hover { background: #c0392b; }
        .soal {
            background: white;
            padding: 16px 18px;
            border-radius: 14px;
            border-left: 5px solid #2e86c1;
            margin-bottom: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .soal.benar { border-left-color: #27ae60; background: #f0faf4; }
        .soal.salah { border-left-color: #e74c3c; background: #fdf0ef; }
        .no-soal { font-weight: 700; color: #1a5276; margin-bottom: 4px; }
        .teks { font-size: 15px; font-weight: 500; margin-bottom: 8px; }
        .opsi {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .opsi label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 12px;
            border-radius: 8px;
            background: #f8f9fa;
            border: 1.5px solid #e9ecef;
            cursor: pointer;
            font-size: 14px;
        }
        .opsi label:hover { background: #eaf2f8; }
        .opsi input[type="radio"] {
            width: 16px;
            height: 16px;
            accent-color: #1a5276;
        }
        .opsi label.benar { background: #d5f5e3; border-color: #27ae60; }
        .opsi label.salah { background: #fadbd8; border-color: #e74c3c; }
        .opsi label.disabled { opacity: 0.7; cursor: default; }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #1a5276;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn-submit:hover { background: #154360; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .hasil {
            text-align: center;
            padding: 25px;
            background: #eaf2f8;
            border-radius: 16px;
            margin-top: 15px;
            border: 2px solid #1a5276;
        }
        .hasil .skor { font-size: 48px; font-weight: 800; color: #1a5276; }
        .hasil .skor span { color: #c0392b; }
        .hasil .pesan { font-size: 18px; font-weight: 600; margin: 8px 0; }
        .footer {
            text-align: center;
            margin-top: 18px;
            font-size: 12px;
            color: #5d6d7e;
            border-top: 1px solid #ddd;
            padding-top: 14px;
        }
        @media (max-width: 600px) {
            .container { padding: 16px; }
            .soal { padding: 12px 14px; }
            .teks { font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1>⛵ <span>P2TL</span> & Dinas Jaga Kapal</h1>
    <div class="sub">Peraturan Pencegahan Tubrukan di Laut 1972 • 75 Soal</div>

    <div class="progress">
        <div class="info">Soal <span id="jawab">0</span> / 75</div>
        <div class="bar"><div class="bar-fill" id="progress"></div></div>
        <button class="btn-reset" id="reset">⟲ Ulang</button>
    </div>

    <div id="daftar-soal"></div>
    <button class="btn-submit" id="submit">✅ Periksa Jawaban</button>
    <div id="hasil"></div>
    <div class="footer">⚓ Semoga Sukses — Jaga Keselamatan Pelayaran ⚓</div>
</div>

<script>

{no:37, s:"Kapal menangkap ikan wajib lampu lambung & buritan, kecuali jika?", o:["Di laut lepas","Berhenti & tidak bergerak","Menarik alat","Siang hari"], j:1},
{no:38, s:"Isyarat kapal berlayar tapi berhenti di kabut?", o:["1 panjang/2 menit","2 panjang/2 menit","1 panjang + 2 pendek","1 pendek + 1 panjang + 1 pendek"], j:1},
{no:39, s:"Kapal <12m berlabuh di luar alur sempit perlihatkan?", o:["Putih di depan","Putih depan & buritan","1 putih di tempat terlihat","2 putih"], j:2},
{no:40, s:"Perwira jaga panggil nakhoda, kecuali?", o:["Jarak tampak turun","Lalu lintas padat","Kapal di alur sempit","Ragu-ragu"], j:2},
{no:41, s:"Yang dihindari dalam ubah haluan?", o:["Ubah besar & jelas","Ubah sedikit-sedikit","Ubah ke kanan","Ubah + kurangi kecepatan"], j:1},
{no:42, s:"Jarak tampak lampu tiang kapal ≥50m?", o:["3 mil","5 mil","6 mil","8 mil"], j:2},
{no:43, s:"Situasi bersilangan, kapal wajib memberi jalan?", o:["Lihat kapal di kanan","Lihat kapal di kiri","Kapal lebih besar","Kapal lebih cepat"], j:0},
{no:44, s:"Kapal NUC malam hari perlihatkan?", o:["2 merah","2 putih","3 merah","1 merah"], j:0},
{no:45, s:"Pengamatan baik harus dilakukan terus-menerus dengan?", o:["Mata & telinga","Mata, telinga, semua alat bantu","Radar & AIS","Hanya malam"], j:1},
{no:46, s:"Sektor lampu buritan?", o:["112.5°","135°","225°","360°"], j:1},
{no:47, s:"Di kabut, kapal deteksi radar di depan harus?", o:["Ubah ke kiri","Ubah ke kanan","Kurangi & hentikan","Tambah kecepatan"], j:1},
{no:48, s:"Bukan tugas perwira jaga saat berlabuh?", o:["Tentukan posisi","Periksa rantai","Pastikan pengamatan","Atur kecepatan manuver"], j:3},
{no:49, s:"Lampu putih depan & buritan berbeda tinggi =?", o:["Berlabuh","Berlayar","NUC","Terbatas"], j:0},
{no:50, s:"5 tiupan pendek (.....) berarti?", o:["Susul kanan","Susul kiri","Ragu-ragu/tidak mengerti","Balik arah"], j:2},
{no:51, s:"Faktor harus diperhatikan Aturan 6?", o:["Daya & ukuran","Penglihatan, kepadatan, olah gerak","Muatan & penumpang","Waktu & musim"], j:1},
{no:52, s:"Sudut lampu keliling?", o:["112.5°","135°","225°","360°"], j:3},

{no:56, s:"Kapal <50m berlabuh perlihatkan?", o:["2 putih","1 putih di depan","1 putih depan & 1 buritan","1 putih di tiang"], j:1},
{no:57, s:"Isyarat susul dari kiri?", o:["— — •","— — ••","•• — —","• — • —"], j:1},

{no:59, s:"1 tiup panjang (—) di perairan sempit berarti?", o:["Belok kiri","Belok kanan","Mundur","Berhenti"], j:1},
{no:60, s:"Faktor kecepatan aman Aturan 6, kecuali?", o:["Sarat & ruang gerak","Cuaca & jarak","Radar & navigasi","Jumlah awak"], j:3},
{no:61, s:"2 merah bersusun tegak =?", o:["Kapal tenaga","Menangkap ikan","NUC","Terbatas"], j:2},
{no:62, s:"Sektor lampu lambung kiri (merah)?", o:["112.5° ke kiri","112.5° ke kanan","135° ke kiri","225° ke kiri"], j:0},
{no:63, s:"Hujan lebat & jarak tampak terbatas, perwira jaga?", o:["Kurangi kecepatan & mesin siaga","Percepat laju","Matikan radar","Berhenti & buang sauh"], j:0},
{no:64, s:"Tugas pengamat, kecuali?", o:["Perhatian penuh","Tidak diberi tugas lain","Memegang kemudi","Gunakan alat navigasi"], j:2},
{no:65, s:"Kapal terbatas olah gerak, kecuali?", o:["Mengeruk","Naik/turun pesawat","Menangkap ikan","Pasang rambu"], j:2},
{no:66, s:"Aturan 19, kapal dengar isyarat kabut di depan?", o:["Tetap haluan","Kurangi kecepatan minimum","Ubah 90° ke kanan","Henti mesin"], j:1},
{no:67, s:"Kapal berlabuh malam perlihatkan?", o:["Putih di depan","2 putih jika ≥50m","Lambung & buritan","Tiang depan & belakang"], j:1},
{no:68, s:"Isyarat belok kiri di perairan sempit?", o:["—","— —","•","••"], j:1},
{no:69, s:"Perwira jaga panggil nakhoda jika?", o:["Ragu-ragu","Masuk pelabuhan","Ganti haluan","Kurangi kecepatan"], j:0},
{no:70, s:"Kapal ≥50m berlayar malam, kecuali?", o:["Tiang depan","Tiang belakang","Keliling putih","Lambung & buritan"], j:2},
{no:71, s:"Kapal disusul wajib?", o:["Ubah ke kanan","Tetap haluan & kecepatan","Kurangi kecepatan","5 tiupan pendek"], j:1},
{no:72, s:"Manfaat pengamatan Aturan 5?", o:["Tahu muatan","Deteksi bahaya tubrukan","Hitung kecepatan","Tentukan posisi GPS"], j:1},
{no:73, s:"Kapal menderek di kabut isyarat?", o:["1 panjang/2 menit","2 panjang/2 menit","1 panjang + 2 pendek","2 panjang + 1 pendek"], j:3},
{no:74, s:"Penggunaan radar, kecuali?", o:["Jarak tepat","Ubah skala berkala","Hanya malam hari","Konfirmasi cuaca terang"], j:2},
{no:75, s:"Kebiasaan pelaut baik, kecuali?", o:["Tidak bahayakan kapal","Tidak alkohol","Selalu radar meski cerah","Kewaspadaan"], j:2}
];

// ============ STATE ============
let jawaban = new Array(75).fill(null);
let terjawab = new Array(75).fill(false);
let selesai = false;

const container = document.getElementById('daftar-soal');
const submitBtn = document.getElementById('submit');
const resetBtn = document.getElementById('reset');
const hasilDiv = document.getElementById('hasil');
const jawabSpan = document.getElementById('jawab');
const progressFill = document.getElementById('progress');

// ============ RENDER ============
function render() {
    let html = '';
    data.forEach((d, i) => {
        const selected = jawaban[i];
        const status = terjawab[i] ? (selected === d.j ? 'benar' : 'salah') : '';
        const ikon = terjawab[i] ? (selected === d.j ? '✅' : '❌') : '⬜';
        html += `<div class="soal ${status}">`;
        html += `<div class="no-soal">Soal ${d.no} <span style="float:right">${ikon}</span></div>`;
        html += `<div class="teks">${d.s}</div>`;
        html += `<div class="opsi">`;
        const label = ['a','b','c','d'];
        d.o.forEach((opt, oi) => {
            let cls = '';
            let dis = '';
            let cek = (selected === oi) ? 'checked' : '';
            if (terjawab[i]) {
                dis = 'disabled';
                if (oi === d.j) cls = 'benar';
                if (oi === selected && selected !== d.j) cls = 'salah';
            }
            html += `<label class="${cls} ${dis}">
                <input type="radio" name="q${i}" value="${oi}" ${cek} ${dis}>
                <span><strong>${label[oi]}.</strong> ${opt}</span>
            </label>`;
        });
        html += `</div></div>`;
    });
    container.innerHTML = html;

    // Event radio
    document.querySelectorAll('input[type="radio"]').forEach(r => {
        r.addEventListener('change', function() {
            if (selesai) return;
            const idx = parseInt(this.name.replace('q',''));
            jawaban[idx] = parseInt(this.value);
            updateProgress();
        });
    });

    updateProgress();
}

function updateProgress() {
    let terpilih = jawaban.filter(a => a !== null).length;
    jawabSpan.textContent = terpilih;
    progressFill.style.width = (terpilih/75*100) + '%';
    submitBtn.disabled = selesai || terpilih < 75;
}

// ============ SUBMIT ============
function submit() {
    if (selesai) return;
    const terpilih = jawaban.filter(a => a !== null).length;
    if (terpilih < 75) {
        alert('Silakan jawab semua soal terlebih dahulu!');
        return;
    }
    let benar = 0;
    for (let i=0; i<75; i++) {
        terjawab[i] = true;
        if (jawaban[i] === data[i].j) benar++;
    }
    selesai = true;
    submitBtn.disabled = true;
    render();

    const pct = Math.round(benar/75*100);
    let pesan = '';
    if (pct >= 90) pesan = '🏆 Sangat Memuaskan! Anda Ahli P2TL!';
    else if (pct >= 75) pesan = '👍 Baik! Terus Tingkatkan.';
    else if (pct >= 50) pesan = '📖 Perlu Belajar Lebih Giat.';
    else pesan = '😓 Pelajari Kembali Materi P2TL.';

    hasilDiv.innerHTML = `
        <div class="hasil">
            <div class="skor">${benar} <span>/</span> 75</div>
            <div class="pesan">${pesan}</div>
            <div style="font-size:14px;color:#2c3e50;">Persentase: ${pct}%</div>
            <button onclick="reset()" style="margin-top:10px;padding:8px 24px;background:#27ae60;color:white;border:none;border-radius:20px;font-weight:700;cursor:pointer;">🔄 Coba Lagi</button>
        </div>
    `;
}

function reset() {
    jawaban = new Array(75).fill(null);
    terjawab = new Array(75).fill(false);
    selesai = false;
    hasilDiv.innerHTML = '';
    submitBtn.disabled = true;
    render();
    document.querySelector('.container').scrollTop = 0;
}

submitBtn.addEventListener('click', submit);
resetBtn.addEventListener('click', reset);

render();
</script>

</body>
</html>
